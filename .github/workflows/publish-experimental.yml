name: Publish Experimental Snapshot
on:
  workflow_dispatch:
env:
  TURBO_TELEMETRY_DISABLED: 1
jobs:
  publish-experimental:
    name: Publish Experimental Snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # to create/update PR comments
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Enforce experimental/* branch pattern
      - name: Verify experimental branch
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [[ ! "$BRANCH_NAME" =~ ^experimental/ ]]; then
            echo "Error: This workflow only runs on experimental/* branches"
            echo "Current branch: $BRANCH_NAME"
            exit 1
          fi
          echo "✓ Running on experimental branch: $BRANCH_NAME"

      # Extract feature name from branch (experimental/<feature> → <feature>)
      - name: Extract feature name
        id: feature
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          FEATURE_NAME="${BRANCH_NAME#experimental/}"
          echo "name=$FEATURE_NAME" >> $GITHUB_OUTPUT
          echo "✓ Feature name: $FEATURE_NAME"

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          registry-url: 'https://registry.npmjs.org'
          node-version-file: 'package.json'
          cache: 'pnpm'

      - run: pnpm install

      # Quality checks (minimal: build + types)
      - name: Build all packages
        run: pnpm run build

      - name: Creating .npmrc
        run: |
          cat << EOF > "$HOME/.npmrc"
            //registry.npmjs.org/:_authToken=$NPM_TOKEN
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Snapshot versioning and publishing
      - name: Version snapshot packages
        run: pnpm changeset version --snapshot ${{ steps.feature.outputs.name }}

      - name: Publish snapshot packages
        id: publish
        run: |
          pnpm changeset publish --tag ${{ steps.feature.outputs.name }} 2>&1 | tee publish-output.txt
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat publish-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Parse published packages from changeset output
      - name: Parse published packages
        id: packages
        run: |
          # Extract package names and versions from publish output
          PACKAGES=$(grep -E '🦋  success packages published successfully:' publish-output.txt -A 100 | grep -E '^🦋  ' | grep -v 'success' || echo "")

          # Create JSON array of published packages
          if [ -z "$PACKAGES" ]; then
            echo "list=[]" >> $GITHUB_OUTPUT
          else
            PACKAGE_JSON="["
            while IFS= read -r line; do
              # Extract package name and version from lines like "🦋  @accelint/design-toolkit@9.11.0-experimental-dark-mode-20260507"
              if [[ "$line" =~ 🦋[[:space:]]+(@[^@]+)@([^[:space:]]+) ]]; then
                PKG_NAME="${BASH_REMATCH[1]}"
                PKG_VERSION="${BASH_REMATCH[2]}"
                PACKAGE_JSON="$PACKAGE_JSON{\"name\":\"$PKG_NAME\",\"version\":\"$PKG_VERSION\"},"
              fi
            done <<< "$PACKAGES"
            PACKAGE_JSON="${PACKAGE_JSON%,}]"
            echo "list=$PACKAGE_JSON" >> $GITHUB_OUTPUT
          fi

      # Find associated PR
      - name: Find PR for this branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            if (prs.length > 0) {
              return prs[0].number;
            }
            return null;

      # Create or update PR comment with install instructions
      - name: Create or update PR comment
        if: steps.pr.outputs.result != 'null'
        uses: actions/github-script@v7
        env:
          PACKAGES: ${{ steps.packages.outputs.list }}
          FEATURE_NAME: ${{ steps.feature.outputs.name }}
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.result }};
            const packages = JSON.parse(process.env.PACKAGES);
            const featureName = process.env.FEATURE_NAME;
            const publishDate = new Date().toISOString().split('T')[0];

            if (packages.length === 0) {
              console.log('No packages published, skipping PR comment');
              return;
            }

            // Generate install instructions for all published packages
            const installInstructions = packages.map(pkg =>
              `npm install ${pkg.name}@${featureName}`
            ).join('\n');

            const packageList = packages.map(pkg =>
              `- \`${pkg.name}@${pkg.version}\``
            ).join('\n');

            const commentBody = `## 🧪 Experimental Snapshot Published

            **Feature:** \`${featureName}\`
            **Published:** ${publishDate}

            ### Published Packages
            ${packageList}

            ### Installation
            \`\`\`bash
            ${installInstructions}
            \`\`\`

            ### ⚠️ Experimental Warning
            This is an experimental build for testing and feedback only. It:
            - May have incomplete features or breaking changes
            - Is not production-ready
            - Will not be maintained long-term
            - Has a 1-month time-box for evaluation

            **Last published:** ${new Date().toUTCString()}`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🧪 Experimental Snapshot Published')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('Updated existing PR comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
              console.log('Created new PR comment');
            }
