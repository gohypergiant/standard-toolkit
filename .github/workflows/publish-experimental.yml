name: Publish Experimental Snapshot
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run mode (skip npm publish, show what would happen)'
        type: boolean
        default: false
env:
  TURBO_TELEMETRY_DISABLED: 1
jobs:
  publish-experimental:
    name: Publish Experimental Snapshot
    # Only allow on experimental/* branches
    if: startsWith(github.ref, 'refs/heads/experimental/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # to create/update PR comments
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Show run mode
      - name: Check run mode
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "🧪 DRY-RUN MODE: Will simulate publish without uploading to npm"
            echo "## 🧪 Dry-Run Mode Enabled" >> $GITHUB_STEP_SUMMARY
            echo "This workflow will show what would be published without actually publishing to npm." >> $GITHUB_STEP_SUMMARY
          else
            echo "🚀 PRODUCTION MODE: Will publish to npm registry"
            echo "## 🚀 Production Mode" >> $GITHUB_STEP_SUMMARY
            echo "This workflow will publish packages to npm registry." >> $GITHUB_STEP_SUMMARY
          fi

      # Extract feature name from branch (experimental/<feature> → <feature>)
      - name: Extract feature name
        id: feature
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          FEATURE_NAME="${BRANCH_NAME#experimental/}"

          # Validate feature name. It flows into shell args and becomes an npm
          # dist-tag, so restrict to a conservative slug pattern.
          if [[ ! "$FEATURE_NAME" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "Error: feature name '$FEATURE_NAME' must match ^[a-z][a-z0-9-]*$"
            echo "       (lowercase letters, digits, and hyphens; must start with a letter)"
            exit 1
          fi


          echo "name=$FEATURE_NAME" >> $GITHUB_OUTPUT
          echo "✓ Feature name: $FEATURE_NAME"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Experimental Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`$BRANCH_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Feature:** \`$FEATURE_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **npm tag:** \`@$FEATURE_NAME\`" >> $GITHUB_STEP_SUMMARY

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          registry-url: 'https://registry.npmjs.org'
          node-version-file: 'package.json'
          cache: 'pnpm'

      - run: pnpm install

      # Quality checks (minimal: build + types)
      - name: Build all packages
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Creating .npmrc
        run: |
          cat <<EOF > "$HOME/.npmrc"
          //registry.npmjs.org/:_authToken=$NPM_TOKEN
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Snapshot versioning and publishing
      - name: Version snapshot packages
        run: |
          echo "## 📦 Snapshot Versioning" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          pnpm changeset version --snapshot ${{ steps.feature.outputs.name }} 2>&1 | tee version-output.txt
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat version-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Publish snapshot packages
        if: ${{ !inputs.dry_run }}
        id: publish
        run: |
          pnpm changeset publish --tag ${{ steps.feature.outputs.name }} 2>&1 | tee publish-output.txt
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat publish-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run publish
        if: ${{ inputs.dry_run }}
        id: publish_dryrun
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🧪 Dry-Run Publish" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          pnpm changeset publish --tag ${{ steps.feature.outputs.name }} --dry-run 2>&1 | tee publish-output.txt
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat publish-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat publish-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Parse published packages from changeset output
      - name: Parse published packages
        id: packages
        run: |
          # Extract package names and versions from publish output
          PACKAGES=$(grep -E '🦋  success packages published successfully:' publish-output.txt -A 100 | grep -E '^🦋  ' | grep -v 'success' || echo "")

          # Create JSON array of published packages
          if [ -z "$PACKAGES" ]; then
            echo "list=[]" >> $GITHUB_OUTPUT
          else
            PACKAGE_JSON="["
            while IFS= read -r line; do
              # Extract package name and version from lines like "🦋  @accelint/design-toolkit@9.11.0-experimental-dark-mode-20260507"
              if [[ "$line" =~ 🦋[[:space:]]+(@[^@]+)@([^[:space:]]+) ]]; then
                PKG_NAME="${BASH_REMATCH[1]}"
                PKG_VERSION="${BASH_REMATCH[2]}"
                PACKAGE_JSON="$PACKAGE_JSON{\"name\":\"$PKG_NAME\",\"version\":\"$PKG_VERSION\"},"
              fi
            done <<< "$PACKAGES"
            PACKAGE_JSON="${PACKAGE_JSON%,}]"
            echo "list=$PACKAGE_JSON" >> $GITHUB_OUTPUT
          fi

          # Add summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Package Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -z "$PACKAGES" ]; then
            echo "No packages to publish" >> $GITHUB_STEP_SUMMARY
          else
            while IFS= read -r line; do
              if [[ "$line" =~ 🦋[[:space:]]+(@[^@]+)@([^[:space:]]+) ]]; then
                PKG_NAME="${BASH_REMATCH[1]}"
                PKG_VERSION="${BASH_REMATCH[2]}"
                echo "- \`$PKG_NAME@$PKG_VERSION\`" >> $GITHUB_STEP_SUMMARY
              fi
            done <<< "$PACKAGES"
          fi

      # Find associated PR
      - name: Find PR for this branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            if (prs.length > 0) {
              return prs[0].number;
            }
            return null;

      # Create or update PR comment with install instructions
      - name: Create or update PR comment
        if: steps.pr.outputs.result != 'null' && !inputs.dry_run
        uses: actions/github-script@v7
        env:
          PACKAGES: ${{ steps.packages.outputs.list }}
          FEATURE_NAME: ${{ steps.feature.outputs.name }}
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.result }};
            const packages = JSON.parse(process.env.PACKAGES);
            const featureName = process.env.FEATURE_NAME;
            const publishDate = new Date().toISOString().split('T')[0];

            if (packages.length === 0) {
              console.log('No packages published, skipping PR comment');
              return;
            }

            // Generate install instructions for all published packages
            const installInstructions = packages.map(pkg =>
              `npm install ${pkg.name}@${featureName}`
            ).join('\n');

            const packageList = packages.map(pkg =>
              `- \`${pkg.name}@${pkg.version}\``
            ).join('\n');

            const commentBody = `## 🧪 Experimental Snapshot Published

            **Feature:** \`${featureName}\`
            **Published:** ${publishDate}

            ### Published Packages
            ${packageList}

            ### Installation
            \`\`\`bash
            ${installInstructions}
            \`\`\`

            ### ⚠️ Experimental Warning
            This is an experimental build for testing and feedback only. It:
            - May have incomplete features or breaking changes
            - Is not production-ready
            - Will not be maintained long-term
            - Has a 1-month time-box for evaluation

            **Last published:** ${new Date().toUTCString()}`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🧪 Experimental Snapshot Published')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('Updated existing PR comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
              console.log('Created new PR comment');
            }

      # Dry-run PR comment simulation
      - name: Simulate PR comment (dry-run)
        if: steps.pr.outputs.result != 'null' && inputs.dry_run
        uses: actions/github-script@v7
        env:
          PACKAGES: ${{ steps.packages.outputs.list }}
          FEATURE_NAME: ${{ steps.feature.outputs.name }}
        with:
          script: |
            const packages = JSON.parse(process.env.PACKAGES);
            const featureName = process.env.FEATURE_NAME;

            core.summary.addHeading('PR Comment Preview (Dry-Run)', 2);
            core.summary.addRaw('\n');
            core.summary.addRaw('The following comment would be posted/updated on the PR:\n\n');
            core.summary.addCodeBlock(`
            ## 🧪 Experimental Snapshot Published

            **Feature:** ${featureName}
            **Published:** ${new Date().toISOString().split('T')[0]}

            ### Published Packages
            ${packages.map(pkg => `- \`${pkg.name}@${pkg.version}\``).join('\n')}

            ### Installation
            \`\`\`bash
            ${packages.map(pkg => `npm install ${pkg.name}@${featureName}`).join('\n')}
            \`\`\`

            ### ⚠️ Experimental Warning
            This is an experimental build for testing and feedback only.
            `, 'markdown');
            await core.summary.write();

            console.log('Dry-run: Would post/update PR comment on PR #' + ${{ steps.pr.outputs.result }});
