# Visual Regression Snapshot Update Workflow
#
# This workflow manually updates visual regression test baselines on feature branches.
# It detects which tests are failing, regenerates only those baselines, and commits
# the changes back to the branch.
#
# Usage:
# 1. Go to Actions tab in GitHub
# 2. Select "Update Visual Regression Snapshots"
# 3. Click "Run workflow" and select your branch
#
# Safety: This workflow cannot run on the main branch.

name: Update Visual Regression Snapshots

on:
  workflow_dispatch:
    inputs:
      failed_files:
        description: 'Newline-separated list of failing .visual.tsx file paths (relative to apps/next). Leave empty to auto-detect.'
        required: false
        type: string

permissions:
  contents: write

env:
  TURBO_TELEMETRY_DISABLED: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-snapshots:
    name: Update Snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check branch
        if: github.ref == 'refs/heads/main'
        run: |
          echo "::error::Cannot update snapshots on main branch"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-visual-update-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-visual-update-
            ${{ runner.os }}-turbo-visual-
            ${{ runner.os }}-turbo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
          node-version-file: 'package.json'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium
        working-directory: apps/next

      - name: Use provided failure list
        id: detect-from-input
        if: inputs.failed_files != ''
        env:
          INPUT_FAILED_FILES: ${{ inputs.failed_files }}
        run: |
          # Validate each line matches expected path pattern
          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            if ! echo "$line" | grep -qE '^src/features/[a-zA-Z0-9/_-]+\.visual\.tsx$'; then
              echo "::error::Invalid file path: $line"
              echo "Each line must match: src/features/{path}.visual.tsx"
              exit 1
            fi
          done <<< "$INPUT_FAILED_FILES"

          echo "has_failures=true" >> $GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "failed_files<<$EOF" >> $GITHUB_OUTPUT
          echo "$INPUT_FAILED_FILES" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          echo "Skipping detection — using provided failure list:"
          echo "$INPUT_FAILED_FILES"

      - name: Detect failing visual tests
        id: detect
        if: inputs.failed_files == ''
        working-directory: apps/next
        run: |
          pnpm visual --reporter=default --reporter=json --outputFile=test-results.json || TEST_EXIT_CODE=$?
          TEST_EXIT_CODE=${TEST_EXIT_CODE:-0}

          if [ ! -f test-results.json ]; then
            echo "::error::Test runner crashed without producing test-results.json"
            exit 1
          fi

          FAILED_FILES=$(node ../../.github/scripts/extract-failed-files.mjs test-results.json --relative-to=$(pwd))

          if [ -z "$FAILED_FILES" ]; then
            echo "has_failures=false" >> $GITHUB_OUTPUT
            echo "No failing visual tests detected"
          else
            echo "has_failures=true" >> $GITHUB_OUTPUT
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "failed_files<<$EOF" >> $GITHUB_OUTPUT
            echo "$FAILED_FILES" >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
            echo "Failing test files:"
            echo "$FAILED_FILES"
          fi

      - name: Update failed baselines
        if: steps.detect-from-input.outputs.has_failures == 'true' || steps.detect.outputs.has_failures == 'true'
        working-directory: apps/next
        env:
          INPUT_FAILED_FILES: ${{ steps.detect-from-input.outputs.failed_files }}
          DETECTED_FAILED_FILES: ${{ steps.detect.outputs.failed_files }}
        run: |
          FAILED_FILES="${INPUT_FAILED_FILES:-$DETECTED_FAILED_FILES}"
          FILE_ARGS=$(echo "$FAILED_FILES" | tr '\n' ' ')
          pnpm exec vitest --project=visual --run --update --no-coverage $FILE_ARGS

      - name: Check for changes
        id: changes
        run: |
          MODIFIED=$(git diff --name-only -- 'apps/next/src/features/**/__screenshots__/**/*.png')
          UNTRACKED=$(git ls-files --others --exclude-standard -- 'apps/next/src/features/**/__screenshots__/**/*.png')

          if [ -z "$MODIFIED" ] && [ -z "$UNTRACKED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No screenshot changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Screenshot changes detected:"
            if [ -n "$MODIFIED" ]; then echo "$MODIFIED"; fi
            if [ -n "$UNTRACKED" ]; then echo "$UNTRACKED"; fi
          fi

      - name: Configure git
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add 'apps/next/src/features/**/__screenshots__/**/*.png'
          git commit -m "chore: update visual regression snapshots

          Co-authored-by: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
          git push

      - name: Generate summary
        env:
          INPUT_HAS_FAILURES: ${{ steps.detect-from-input.outputs.has_failures }}
          DETECTED_HAS_FAILURES: ${{ steps.detect.outputs.has_failures }}
          INPUT_FAILED_FILES: ${{ steps.detect-from-input.outputs.failed_files }}
          DETECTED_FAILED_FILES: ${{ steps.detect.outputs.failed_files }}
          HAS_CHANGES: ${{ steps.changes.outputs.has_changes }}
        run: |
          echo "## Visual Regression Snapshot Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          HAS_FAILURES="${INPUT_HAS_FAILURES:-$DETECTED_HAS_FAILURES}"
          FAILED_FILES="${INPUT_FAILED_FILES:-$DETECTED_FAILED_FILES}"

          if [[ "$HAS_FAILURES" != "true" ]]; then
            echo "**No failing tests detected** - all snapshots are already up to date." >> $GITHUB_STEP_SUMMARY
          elif [ "$HAS_CHANGES" == "true" ]; then
            echo "**Snapshots updated and pushed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Targeted test files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$FAILED_FILES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Updated baselines:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git log -1 --name-only --pretty=format: -- '*.png' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "**No baseline changes** - tests were re-run but no PNGs changed." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "<sub>Triggered by @${{ github.actor }}</sub>" >> $GITHUB_STEP_SUMMARY
